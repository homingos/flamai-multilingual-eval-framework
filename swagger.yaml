openapi: 3.0.3
info:
  title: Phase 2A — Falcon Language Support Evaluation Registry
  description: |
    Registry API for the Flam AI Phase 2A multilingual LLM evaluation pipeline.

    Stores and manages all configuration for the evaluation run — regional models,
    GPU hardware presets, evaluation metrics, task definitions, and experiment runs.
    All inference workers (vLLM containers) read their config from this API at
    startup; metric workers read enabled metrics from it after inference completes.

    ## Authentication

    All endpoints except `GET /health` require a signed JWT passed as a Bearer token.
    Write operations (POST / PATCH) additionally require the `registry:write` scope
    to be present in the token's `scopes` claim.

    ```
    Authorization: Bearer <jwt>
    ```

    Tokens are generated with `scripts/jwt_token_generator.py`:
    ```bash
    JWT_TOKEN=$(python scripts/jwt_token_generator.py \
      --secret $JWT_SECRET \
      --scopes registry:write)
    ```

    ## State machine — models

    Models follow a one-way state machine. `deprecated` is terminal.

    ```
    active ──► disabled ──► deprecated
      │                         ▲
      └─────────────────────────┘
    ```

    No DELETE endpoints exist. Models are disabled or deprecated, never removed.

    ## Run ID format

    Run IDs are `YYYY-MM-DD_HHMMSS_<5-char-hex>` e.g. `2026-06-18_072753_54b2bf`.
    They are generated by the registry on `POST /runs` and propagated to all
    inference containers so every output file is scoped to a single experiment.

  version: 1.0.0
  contact:
    name: Flam AI — Falcon Language Support
  license:
    name: Proprietary

servers:
  - url: https://ai-team-core--phase2a-registry-dev.modal.run/api/v1
    description: Development (Modal, deployed)
  - url: http://localhost:8000/api/v1
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT signed with HS256. Read endpoints require a valid token.
        Write endpoints additionally require `registry:write` in the `scopes` claim.

  schemas:

    # -----------------------------------------------------------------------
    # Shared
    # -----------------------------------------------------------------------

    ErrorDetail:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error message.
          example: "Model 'tamil-mistral-7b' not found."
        error_code:
          type: string
          nullable: true
          description: Machine-readable error code for programmatic handling.
          example: NOT_FOUND

    # -----------------------------------------------------------------------
    # Health
    # -----------------------------------------------------------------------

    HealthStatus:
      type: string
      enum:
        - ok
        - degraded

    HealthCheckResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        service:
          type: string
          example: phase2a-registry
        version:
          type: string
          example: "0.1.0"

    # -----------------------------------------------------------------------
    # Models
    # -----------------------------------------------------------------------

    ModelState:
      type: string
      enum:
        - active
        - disabled
        - deprecated
      description: |
        Lifecycle state of a model entry. Transitions:
        `active → disabled`, `active → deprecated`, `disabled → active`,
        `disabled → deprecated`. `deprecated` is terminal — no further transitions.

    ModelObject:
      type: object
      description: A registered regional or baseline LLM.
      required:
        - id
        - name
        - hf_model_id
        - language
        - slug
        - region
        - gpu_preset
        - params_billions
        - state
        - dtype
        - gpu_memory_utilization
        - max_model_len
      properties:
        id:
          type: string
          description: Unique slug used as the primary key throughout the pipeline.
          example: tamil-mistral-7b
        name:
          type: string
          description: Human-readable display name.
          example: Tamil-Mistral-7B
        hf_model_id:
          type: string
          description: HuggingFace repository path used by vLLM to load weights.
          example: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
        language:
          type: string
          description: Target language this model was trained for.
          example: Tamil
        slug:
          type: string
          description: |
            Dataset folder name under `/data/benchmarks/{task}/{slug}/`.
            Must match the directory name exactly.
          example: tamil
        region:
          type: string
          description: Geographical or linguistic region grouping.
          example: Indic
        gpu_preset:
          type: string
          description: |
            Key into the hardware preset table. Determines which GPU tier
            the vLLM container is assigned when this model runs.
          enum:
            - t4
            - l4
            - l40s
            - a100_80gb
            - rtx_pro_6000
          example: l4
        params_billions:
          type: number
          format: float
          description: Approximate parameter count in billions.
          example: 7.0
        state:
          $ref: "#/components/schemas/ModelState"
        dtype:
          type: string
          description: PyTorch dtype passed to vLLM.
          enum:
            - bfloat16
            - float16
            - float32
          default: bfloat16
          example: bfloat16
        gpu_memory_utilization:
          type: number
          format: float
          minimum: 0.1
          maximum: 1.0
          description: |
            Fraction of GPU VRAM allocated to the KV cache. Passed directly
            to vLLM's `gpu_memory_utilization` parameter. 0.88 is safe for
            most 7B models on L4.
          default: 0.88
          example: 0.88
        max_model_len:
          type: integer
          minimum: 128
          description: Maximum sequence length (prompt + completion tokens) for vLLM.
          default: 2048
          example: 2048
        chat_template:
          type: string
          nullable: true
          description: |
            Jinja2 chat template string fetched from the HuggingFace tokenizer
            via `POST /models/{model_id}/fetch-chat-template`.

            **Three states:**
            - `null` — template has never been fetched; vLLM falls back to plain-text prompts.
            - `""` — fetch was attempted but the tokenizer has no template; normalised to `null`.
            - non-empty string — valid Jinja2 template; vLLM uses `llm.chat()` with this template.

            Run `scripts/fetch_chat_templates.py` after deploy to populate all models.
          example: null
        notes:
          type: string
          nullable: true
          description: Free-text notes about this model entry.
          example: "Gemma-4 26B A4B IT — Phase 2A baseline model"
        created_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-18T07:00:00Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-18T07:27:53Z"

    CreateModelRequest:
      type: object
      required:
        - id
        - name
        - hf_model_id
        - language
        - slug
        - region
        - gpu_preset
        - params_billions
      properties:
        id:
          type: string
          minLength: 1
          description: Unique slug — used as primary key. Cannot be changed after creation.
          example: tamil-mistral-7b
        name:
          type: string
          example: Tamil-Mistral-7B
        hf_model_id:
          type: string
          example: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
        language:
          type: string
          example: Tamil
        slug:
          type: string
          description: Dataset folder name. Must match `/data/benchmarks/{task}/{slug}/`.
          example: tamil
        region:
          type: string
          example: Indic
        gpu_preset:
          type: string
          enum:
            - t4
            - l4
            - l40s
            - a100_80gb
            - rtx_pro_6000
          example: l4
        params_billions:
          type: number
          format: float
          example: 7.0
        dtype:
          type: string
          enum:
            - bfloat16
            - float16
            - float32
          default: bfloat16
        gpu_memory_utilization:
          type: number
          format: float
          minimum: 0.1
          maximum: 1.0
          default: 0.88
        max_model_len:
          type: integer
          minimum: 128
          default: 2048
        notes:
          type: string
          nullable: true
        chat_template:
          type: string
          nullable: true
          description: |
            Optionally supply a chat template at creation time. Usually left null
            and populated later via `POST /models/{model_id}/fetch-chat-template`.

    UpdateModelRequest:
      type: object
      description: |
        Partial update — only fields present in the request body are modified.
        `id`, `language`, `slug`, `region`, and `state` cannot be changed via PATCH;
        use the lifecycle endpoints (`/disable`, `/enable`, `/deprecate`) for state.
      properties:
        name:
          type: string
          example: Tamil-Mistral-7B-v2
        hf_model_id:
          type: string
          description: Use this to point to a newer revision on HuggingFace.
          example: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.2
        gpu_preset:
          type: string
          enum:
            - t4
            - l4
            - l40s
            - a100_80gb
            - rtx_pro_6000
        dtype:
          type: string
          enum:
            - bfloat16
            - float16
            - float32
        gpu_memory_utilization:
          type: number
          format: float
          minimum: 0.1
          maximum: 1.0
        max_model_len:
          type: integer
          minimum: 128
        notes:
          type: string
          nullable: true
        chat_template:
          type: string
          nullable: true
          description: |
            Manually override the chat template. Prefer using
            `POST /models/{model_id}/fetch-chat-template` for automated fetching.

    ModelResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Operation outcome label.
          enum:
            - ok
            - created
            - updated
            - disabled
            - enabled
            - deprecated
          example: created
        data:
          $ref: "#/components/schemas/ModelObject"

    ModelListResponse:
      type: object
      required:
        - models
        - total
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelObject"
        total:
          type: integer
          description: Total number of models returned (after state filter applied).
          example: 18
        state_filter:
          type: string
          nullable: true
          description: The `state` query parameter value that was applied.
          example: active

    FetchChatTemplateResponse:
      type: object
      required:
        - model_id
        - hf_model_id
        - template_found
        - template_length
        - stored
      properties:
        model_id:
          type: string
          example: tamil-mistral-7b
        hf_model_id:
          type: string
          example: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
        template_found:
          type: boolean
          description: |
            `true` if the HuggingFace tokenizer returned a non-empty chat template.
            `false` if the tokenizer had no template — vLLM will use plain-text prompts.
          example: true
        template_length:
          type: integer
          description: Character length of the stored Jinja2 template string. 0 if not found.
          example: 1247
        stored:
          type: boolean
          description: Always `true` — confirms the result was written to the registry.
          example: true

    # -----------------------------------------------------------------------
    # Hardware
    # -----------------------------------------------------------------------

    HardwareObject:
      type: object
      description: |
        A GPU hardware preset. vLLM workers resolve their GPU tier by looking
        up the model's `gpu_preset` key in this table at pipeline start.
      required:
        - id
        - gpu
        - vram_gb
        - cost_per_hr
        - use_for
      properties:
        id:
          type: string
          description: Preset key — matches `gpu_preset` values on model entries.
          example: l4
        gpu:
          type: string
          description: Modal GPU string passed to `@app.cls(gpu=...)`.
          example: L4
        vram_gb:
          type: integer
          description: Available VRAM in gigabytes.
          example: 24
        cost_per_hr:
          type: number
          format: float
          description: Modal on-demand price in USD per hour (June 2026 pricing).
          example: 0.80
        use_for:
          type: string
          description: Human-readable description of intended workload.
          example: "7B/8B inference + model metrics (COMET, BERTScore)"

    CreateHardwareRequest:
      type: object
      required:
        - id
        - gpu
        - vram_gb
        - cost_per_hr
        - use_for
      properties:
        id:
          type: string
          example: l4
        gpu:
          type: string
          example: L4
        vram_gb:
          type: integer
          example: 24
        cost_per_hr:
          type: number
          format: float
          example: 0.80
        use_for:
          type: string
          example: "7B/8B inference + model metrics (COMET, BERTScore)"

    UpdateHardwareRequest:
      type: object
      description: Partial update — only supplied fields are changed.
      properties:
        gpu:
          type: string
        vram_gb:
          type: integer
        cost_per_hr:
          type: number
          format: float
          description: Update when Modal pricing changes.
          example: 0.85
        use_for:
          type: string

    HardwareResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - created
            - updated
          example: created
        data:
          $ref: "#/components/schemas/HardwareObject"

    HardwareListResponse:
      type: object
      required:
        - hardware
        - total
      properties:
        hardware:
          type: array
          items:
            $ref: "#/components/schemas/HardwareObject"
        total:
          type: integer
          example: 5

    # -----------------------------------------------------------------------
    # Metrics
    # -----------------------------------------------------------------------

    MetricStage:
      type: string
      enum:
        - post_inference
        - post_judge
      description: |
        When this metric fires in the pipeline.
        - `post_inference` — computed immediately after inference outputs are written.
        - `post_judge` — computed after LLM judge verdicts are available (Phase 4+).

    ComputeTier:
      type: string
      enum:
        - light
        - model
      description: |
        What compute this metric requires.
        - `light` — CPU-only, rule-based (BLEU, chrF, regex checks). Runs in `LightMetricWorker`.
        - `model` — requires a GPU model (COMET, BERTScore, back-translation). Runs in `ModelMetricWorker` (Phase 4).

    MetricObject:
      type: object
      required:
        - name
        - stage
        - compute_tier
        - task_types
        - enabled
        - weight
      properties:
        name:
          type: string
          description: Unique metric identifier — matches the metric class's `name` attribute.
          example: bleu
        stage:
          $ref: "#/components/schemas/MetricStage"
        compute_tier:
          $ref: "#/components/schemas/ComputeTier"
        task_types:
          type: array
          items:
            type: string
          description: |
            Tasks this metric applies to. Valid values: `translation`, `instructions`, `all`.
          example:
            - translation
        category:
          type: string
          nullable: true
          description: |
            Instruction sub-category filter. When set, the metric only runs on
            instruction samples whose `category` field matches this value.
            Null means the metric applies to all instruction categories.
          enum:
            - length_constraint
            - structured_output
            - topic_boundary
            - tone_style
            - language_compliance
            - number_verbalization
          example: number_verbalization
        enabled:
          type: boolean
          description: |
            When `false`, this metric is skipped by `LightMetricWorker` and `ModelMetricWorker`.
            Use `PATCH /metrics/{name}` to toggle without deleting the metric definition.
          default: true
        weight:
          type: number
          format: float
          minimum: 0.0
          description: |
            Relative weight used when aggregating scores into the final report.
            Higher-weight metrics contribute more to the overall model classification.
          default: 1.0
          example: 2.0
        description:
          type: string
          nullable: true
          example: "Corpus-level BLEU score (sacrebleu) split by translation direction."

    CreateMetricRequest:
      type: object
      required:
        - name
        - stage
        - compute_tier
        - task_types
      properties:
        name:
          type: string
          description: Must be unique. Should match the Python metric class `name` attribute.
          example: bleu
        stage:
          $ref: "#/components/schemas/MetricStage"
        compute_tier:
          $ref: "#/components/schemas/ComputeTier"
        task_types:
          type: array
          items:
            type: string
          example:
            - translation
        category:
          type: string
          nullable: true
          example: null
        enabled:
          type: boolean
          default: true
        weight:
          type: number
          format: float
          minimum: 0.0
          default: 1.0
        description:
          type: string
          nullable: true

    UpdateMetricRequest:
      type: object
      description: |
        Only `enabled`, `weight`, and `description` can be changed after creation.
        Name, stage, compute_tier, task_types, and category are immutable.
      properties:
        enabled:
          type: boolean
          description: Toggle the metric on or off without removing it.
        weight:
          type: number
          format: float
          minimum: 0.0
        description:
          type: string
          nullable: true

    MetricResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - created
            - updated
          example: created
        data:
          $ref: "#/components/schemas/MetricObject"

    MetricListResponse:
      type: object
      required:
        - metrics
        - total
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricObject"
        total:
          type: integer
          example: 18

    # -----------------------------------------------------------------------
    # Tasks
    # -----------------------------------------------------------------------

    TaskObject:
      type: object
      description: |
        An evaluation task definition. Tasks are pre-seeded (`translation`,
        `instructions`, `summarization`) and cannot be created via the API —
        use `PATCH /tasks/{name}` to toggle them active or update descriptions.
      required:
        - name
        - active
        - samples_per_language
      properties:
        name:
          type: string
          description: Task identifier. Pre-seeded values are `translation`, `instructions`, `summarization`.
          example: translation
        active:
          type: boolean
          description: |
            When `false`, this task is excluded from new pipeline runs.
            Existing run outputs are not affected.
          example: true
        samples_per_language:
          type: integer
          description: |
            Total number of samples per language for this task.
            Set from the dataset meta.json at seed time.
          example: 2024
        description:
          type: string
          nullable: true
          example: "English ↔ target language translation (FLORES-200)"

    UpdateTaskRequest:
      type: object
      description: |
        Only `active` and `description` can be changed. Task names and
        sample counts are fixed at seed time.
      properties:
        active:
          type: boolean
          description: Enable or disable this task for future pipeline runs.
        description:
          type: string
          nullable: true

    TaskResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - updated
          example: ok
        data:
          $ref: "#/components/schemas/TaskObject"

    TaskListResponse:
      type: object
      required:
        - tasks
        - total
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TaskObject"
        total:
          type: integer
          example: 3

    # -----------------------------------------------------------------------
    # Runs
    # -----------------------------------------------------------------------

    InferenceConfig:
      type: object
      description: Sampling parameters passed to all vLLM workers for this run.
      properties:
        temperature:
          type: number
          format: float
          default: 0.0
          example: 0.0
        top_p:
          type: number
          format: float
          default: 1.0
          example: 1.0
        max_tokens:
          type: integer
          default: 512
          example: 512

    JudgeConfig:
      type: object
      description: LLM judge configuration for pairwise comparison (Phase 4+).
      properties:
        model:
          type: string
          description: Anthropic API model string for the judge.
          example: claude-haiku-4-5
        swap_runs:
          type: integer
          description: |
            Number of order-swapped repetitions per pair to control for
            position bias in the judge. Default 2 means each pair is judged
            twice with A/B order swapped.
          default: 2
          example: 2

    RunManifest:
      type: object
      description: Full experiment manifest written at run creation and updated throughout the pipeline.
      required:
        - run_id
        - created_at
        - status
        - task_scope
        - inference_config
        - judge
      properties:
        run_id:
          type: string
          description: Unique run identifier in format `YYYY-MM-DD_HHMMSS_<5hex>`.
          example: 2026-06-18_072753_54b2bf
        created_at:
          type: string
          format: date-time
          example: "2026-06-18T07:27:53Z"
        status:
          type: string
          description: |
            Pipeline lifecycle status.
            - `started` — manifest written, inference not yet complete.
            - `inference_complete` — all output files confirmed on volume.
            - `inference_partial` — one or more output files missing (check container logs).
            - `metrics_complete` — light metrics computed and written.
            - `completed` — full pipeline (including judge) finished.
          enum:
            - started
            - inference_complete
            - inference_partial
            - metrics_complete
            - completed
          example: completed
        task_scope:
          type: array
          items:
            type: string
          description: Active tasks included in this run.
          example:
            - translation
            - instructions
        prompt_count:
          type: integer
          description: Total number of prompts across all tasks and languages.
          example: 400
        translation_samples:
          type: integer
          example: 200
        instruction_samples:
          type: integer
          example: 200
        benchmark_hash:
          type: string
          nullable: true
          description: SHA-256 of the benchmark file at run time for reproducibility.
          example: "sha256:a1b2c3..."
        models:
          type: object
          additionalProperties: true
          description: Map of model_id → model config snapshot at run time.
          example:
            tamil-mistral-7b:
              hf_model_id: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
              gpu: L4
              dtype: bfloat16
        inference_config:
          $ref: "#/components/schemas/InferenceConfig"
        judge:
          $ref: "#/components/schemas/JudgeConfig"
        metrics_enabled:
          type: array
          items:
            type: string
          description: Names of metrics that were enabled at run creation.
          example:
            - bleu
            - chrf
            - lang_adherence
        notes:
          type: string
          nullable: true
          example: "Phase 3 pilot — Tamil vs Gemma-4, 200 translation prompts"

    CreateRunRequest:
      type: object
      required:
        - task_scope
      properties:
        task_scope:
          type: array
          items:
            type: string
          description: Active task names to include in this run.
          minItems: 1
          example:
            - translation
            - instructions
        judge_model:
          type: string
          description: |
            Anthropic API model string for the LLM judge. Used in Phase 4 pairwise
            evaluation. Defaults to Haiku for cost efficiency during calibration.
          default: claude-haiku-4-5
          example: claude-haiku-4-5
        notes:
          type: string
          nullable: true
          description: Free-text annotation recorded in the run manifest.
          example: "Tamil vs Gemma-4 comparison pilot"

    RunResponse:
      type: object
      required:
        - status
        - run_id
      properties:
        status:
          type: string
          enum:
            - ok
            - started
          example: started
        run_id:
          type: string
          example: 2026-06-18_072753_54b2bf
        data:
          $ref: "#/components/schemas/RunManifest"

    RunIndexEntry:
      type: object
      description: Lightweight run summary stored in the runs index (not the full manifest).
      required:
        - run_id
        - status
        - created_at
      properties:
        run_id:
          type: string
          example: 2026-06-18_072753_54b2bf
        status:
          type: string
          example: completed
        created_at:
          type: string
          format: date-time
          example: "2026-06-18T07:27:53Z"

    RunListResponse:
      type: object
      required:
        - runs
        - total
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/RunIndexEntry"
        total:
          type: integer
          example: 3

# ---------------------------------------------------------------------------
# Global security default — overridden to [] on /health
# ---------------------------------------------------------------------------
security:
  - BearerAuth: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      summary: Health check
      description: |
        Returns the health status of the registry service. No authentication required.
        Used by Modal's health probe and by the seed script to confirm the service
        is reachable before seeding data.
      operationId: health_check
      tags:
        - Health
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
              example:
                status: ok
                service: phase2a-registry
                version: "0.1.0"

  # ── Models ────────────────────────────────────────────────────────────────

  /models:
    get:
      summary: List models
      description: |
        Returns all registered models, filtered by lifecycle state.
        Default returns only `active` models — what the pipeline uses.
        Pass `state=all` to see disabled and deprecated models too.
      operationId: list_models
      tags:
        - Models
      security:
        - BearerAuth: []
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - disabled
              - deprecated
              - all
            default: active
          description: |
            Filter by lifecycle state. `all` returns models in every state.
          example: active
      responses:
        "200":
          description: List of models matching the state filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
              example:
                models:
                  - id: tamil-mistral-7b
                    name: Tamil-Mistral-7B
                    hf_model_id: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
                    language: Tamil
                    slug: tamil
                    region: Indic
                    gpu_preset: l4
                    params_billions: 7.0
                    state: active
                    dtype: bfloat16
                    gpu_memory_utilization: 0.88
                    max_model_len: 2048
                    chat_template: null
                    notes: null
                    created_at: "2026-06-18T07:00:00Z"
                    updated_at: "2026-06-18T07:00:00Z"
                total: 1
                state_filter: active
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    post:
      summary: Create model
      description: |
        Registers a new model in the registry. The model starts in `active` state.
        Returns 409 if a model with the same `id` already exists.

        Requires `registry:write` scope.
      operationId: create_model
      tags:
        - Models
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateModelRequest"
            example:
              id: tamil-mistral-7b
              name: Tamil-Mistral-7B
              hf_model_id: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
              language: Tamil
              slug: tamil
              region: Indic
              gpu_preset: l4
              params_billions: 7.0
              dtype: bfloat16
              gpu_memory_utilization: 0.88
              max_model_len: 2048
      responses:
        "201":
          description: Model created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
              example:
                status: created
                data:
                  id: tamil-mistral-7b
                  state: active
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Missing required scope: 'registry:write'"
        "409":
          description: A model with this `id` already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Model 'tamil-mistral-7b' already exists."
        "422":
          description: Request body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /models/{model_id}:
    parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
        description: The model's unique slug e.g. `tamil-mistral-7b`.
        example: tamil-mistral-7b

    get:
      summary: Get model
      description: Returns a single model by ID regardless of its current state.
      operationId: get_model
      tags:
        - Models
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Model found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Model 'tamil-mistral-7b' not found."

    patch:
      summary: Update model
      description: |
        Partially updates mutable fields on a model. Only fields included in the
        request body are changed. `id`, `language`, `slug`, `region`, `state`,
        `created_at` are immutable.

        To change state use the lifecycle endpoints below.

        Requires `registry:write` scope.
      operationId: update_model
      tags:
        - Models
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateModelRequest"
            example:
              notes: "Updated to instruct variant"
              gpu_memory_utilization: 0.90
      responses:
        "200":
          description: Model updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /models/{model_id}/disable:
    parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
        example: tamil-mistral-7b
    patch:
      summary: Disable model
      description: |
        Transitions the model from `active` → `disabled`.
        Disabled models are excluded from `GET /models` (active filter) and
        will not be selected for new pipeline runs.

        Returns 409 if the model is already `deprecated` (terminal state).

        Requires `registry:write` scope.
      operationId: disable_model
      tags:
        - Models
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Model disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
              example:
                status: disabled
                data:
                  id: tamil-mistral-7b
                  state: disabled
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Invalid state transition (model is already deprecated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Cannot transition model from 'deprecated' to 'disabled'."

  /models/{model_id}/enable:
    parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
        example: tamil-mistral-7b
    patch:
      summary: Enable model
      description: |
        Transitions the model from `disabled` → `active`.

        Returns 409 if the model is `deprecated`.

        Requires `registry:write` scope.
      operationId: enable_model
      tags:
        - Models
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Model re-enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
              example:
                status: enabled
                data:
                  id: tamil-mistral-7b
                  state: active
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Invalid state transition (model is already deprecated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /models/{model_id}/deprecate:
    parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
        example: tamil-mistral-7b
    patch:
      summary: Deprecate model
      description: |
        Transitions the model to `deprecated`. This is a **terminal state** —
        it cannot be reversed. The model entry is preserved for historical run
        attribution but will never be selected for new pipeline runs.

        Requires `registry:write` scope.
      operationId: deprecate_model
      tags:
        - Models
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Model deprecated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelResponse"
              example:
                status: deprecated
                data:
                  id: tamil-mistral-7b
                  state: deprecated
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Model is already deprecated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /models/{model_id}/fetch-chat-template:
    parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
        description: The model's unique slug.
        example: tamil-mistral-7b
    post:
      summary: Fetch and store chat template
      description: |
        Downloads the HuggingFace tokenizer for this model's `hf_model_id`,
        extracts the Jinja2 `chat_template` string, and stores it in the registry.

        **Idempotent** — safe to call multiple times. Re-calling overwrites the
        previously stored template.

        **Effect on inference:** After deploying a new registry with the template
        stored, all subsequent vLLM workers for this model will use `llm.chat()`
        with the stored template instead of plain-text `llm.generate()`. This
        is the fix for near-zero BLEU/chrF scores caused by missing instruction
        tokens.

        **Gated repos:** The registry container must have `HF_TOKEN` set in the
        `phase2a-auth-secrets` Modal secret to access gated HuggingFace repositories.

        Run `scripts/fetch_chat_templates.py` after each deploy to populate
        all 18 models in a single command.

        Requires `registry:write` scope.
      operationId: fetch_chat_template
      tags:
        - Models
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Template fetched and stored (or None stored if model has no template).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchChatTemplateResponse"
              examples:
                template_found:
                  summary: Model has a chat template
                  value:
                    model_id: gemma-4-26b
                    hf_model_id: google/gemma-4-26B-A4B-it
                    template_found: true
                    template_length: 1892
                    stored: true
                no_template:
                  summary: Model tokenizer has no chat template
                  value:
                    model_id: tamil-mistral-7b
                    hf_model_id: Hemanth-thunder/Tamil-Mistral-7B-Instruct-v0.1
                    template_found: false
                    template_length: 0
                    stored: true
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Model not found in registry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "500":
          description: |
            Template fetch failed (e.g. network error, invalid HF repo).
            The registry entry is unchanged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Hardware ──────────────────────────────────────────────────────────────

  /hardware:
    get:
      summary: List hardware presets
      description: Returns all GPU hardware presets used for cost estimation and worker assignment.
      operationId: list_hardware
      tags:
        - Hardware
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All hardware presets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareListResponse"
              example:
                hardware:
                  - id: l4
                    gpu: L4
                    vram_gb: 24
                    cost_per_hr: 0.80
                    use_for: "7B/8B inference + model metrics (COMET, BERTScore)"
                  - id: a100_80gb
                    gpu: A100-80GB
                    vram_gb: 80
                    cost_per_hr: 2.50
                    use_for: "Gemma-4 26B baseline"
                total: 5
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    post:
      summary: Create hardware preset
      description: |
        Adds a new GPU hardware preset. Returns 409 if the `id` already exists.

        Requires `registry:write` scope.
      operationId: create_hardware
      tags:
        - Hardware
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHardwareRequest"
            example:
              id: l4
              gpu: L4
              vram_gb: 24
              cost_per_hr: 0.80
              use_for: "7B/8B inference + model metrics (COMET, BERTScore)"
      responses:
        "201":
          description: Hardware preset created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Hardware preset with this `id` already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /hardware/{hardware_id}:
    parameters:
      - name: hardware_id
        in: path
        required: true
        schema:
          type: string
        description: Hardware preset ID e.g. `l4`, `a100_80gb`.
        example: l4

    get:
      summary: Get hardware preset
      operationId: get_hardware
      tags:
        - Hardware
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Hardware preset found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Hardware preset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    patch:
      summary: Update hardware preset
      description: |
        Updates mutable fields on a hardware preset. Primarily used to keep
        `cost_per_hr` in sync with Modal pricing changes.

        Requires `registry:write` scope.
      operationId: update_hardware
      tags:
        - Hardware
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHardwareRequest"
            example:
              cost_per_hr: 0.85
      responses:
        "200":
          description: Hardware preset updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HardwareResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Hardware preset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Metrics ───────────────────────────────────────────────────────────────

  /metrics:
    get:
      summary: List metrics
      description: |
        Returns all registered evaluation metrics.
        Pass `enabled_only=true` to get only metrics that will fire in the pipeline.
      operationId: list_metrics
      tags:
        - Metrics
      security:
        - BearerAuth: []
      parameters:
        - name: enabled_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, returns only metrics with `enabled=true`.
      responses:
        "200":
          description: List of metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricListResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    post:
      summary: Create metric
      description: |
        Registers a new evaluation metric definition. Returns 409 if a metric
        with the same `name` already exists.

        Requires `registry:write` scope.
      operationId: create_metric
      tags:
        - Metrics
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMetricRequest"
            example:
              name: bleu
              stage: post_inference
              compute_tier: light
              task_types:
                - translation
              enabled: true
              weight: 1.0
              description: "Corpus-level BLEU score (sacrebleu), split by direction."
      responses:
        "201":
          description: Metric created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: Metric with this name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /metrics/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Metric name e.g. `bleu`, `chrf`, `lang_adherence`.
        example: bleu

    get:
      summary: Get metric
      operationId: get_metric
      tags:
        - Metrics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Metric found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Metric not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    patch:
      summary: Update metric
      description: |
        Toggles a metric on/off or adjusts its weight and description.
        Name, stage, compute_tier, task_types, and category are immutable.

        Requires `registry:write` scope.
      operationId: update_metric
      tags:
        - Metrics
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMetricRequest"
            examples:
              disable:
                summary: Disable a metric
                value:
                  enabled: false
              reweight:
                summary: Increase weight for key metric
                value:
                  weight: 2.0
      responses:
        "200":
          description: Metric updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Metric not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Tasks ─────────────────────────────────────────────────────────────────

  /tasks:
    get:
      summary: List tasks
      description: |
        Returns all evaluation task definitions. Tasks are pre-seeded
        (`translation`, `instructions`, `summarization`) — they cannot
        be created via the API. Use `PATCH /tasks/{name}` to toggle them.
      operationId: list_tasks
      tags:
        - Tasks
      security:
        - BearerAuth: []
      parameters:
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, returns only tasks with `active=true`.
      responses:
        "200":
          description: List of tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
              example:
                tasks:
                  - name: translation
                    active: true
                    samples_per_language: 2024
                    description: "English ↔ target language translation (FLORES-200)"
                  - name: instructions
                    active: true
                    samples_per_language: 1200
                    description: "Talking Avatar instruction following (6 categories)"
                  - name: summarization
                    active: false
                    samples_per_language: 0
                    description: "Summarization (not yet active)"
                total: 3
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /tasks/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        description: Task name — one of `translation`, `instructions`, `summarization`.
        example: translation

    get:
      summary: Get task
      operationId: get_task
      tags:
        - Tasks
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Task found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    patch:
      summary: Update task
      description: |
        Toggles a task active/inactive or updates its description.
        Inactive tasks are skipped in new pipeline runs.

        Requires `registry:write` scope.
      operationId: update_task
      tags:
        - Tasks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
            examples:
              deactivate:
                summary: Disable summarization task
                value:
                  active: false
              update_description:
                summary: Update description
                value:
                  description: "FLORES-200 en↔target, 2024 samples per language"
      responses:
        "200":
          description: Task updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Runs ──────────────────────────────────────────────────────────────────

  /runs:
    get:
      summary: List runs
      description: |
        Returns the runs index — a lightweight list of all experiment runs with
        their IDs, status, and creation timestamps. Does not return full manifests.
        Use `GET /runs/{run_id}` to retrieve the full manifest for a specific run.
      operationId: list_runs
      tags:
        - Runs
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Run index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunListResponse"
              example:
                runs:
                  - run_id: 2026-06-18_072753_54b2bf
                    status: completed
                    created_at: "2026-06-18T07:27:53Z"
                  - run_id: 2026-06-17_143022_a3f9b1
                    status: inference_partial
                    created_at: "2026-06-17T14:30:22Z"
                total: 2
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

    post:
      summary: Create run
      description: |
        Registers a new experiment run and returns its manifest. The run ID is
        generated by the registry and must be passed to all inference containers
        so every output file is scoped under the same run directory on the volume.

        Creating a run does **not** launch any containers — that is done by the
        orchestrator (Modal local entrypoint). This endpoint is purely registry
        bookkeeping.

        Requires `registry:write` scope.
      operationId: create_run
      tags:
        - Runs
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunRequest"
            example:
              task_scope:
                - translation
                - instructions
              judge_model: claude-haiku-4-5
              notes: "Phase 3 pilot — Tamil vs Gemma-4, 200 translation prompts"
      responses:
        "201":
          description: Run created. Manifest contains the generated run_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
              example:
                status: started
                run_id: 2026-06-18_072753_54b2bf
                data:
                  run_id: 2026-06-18_072753_54b2bf
                  created_at: "2026-06-18T07:27:53Z"
                  status: started
                  task_scope:
                    - translation
                    - instructions
                  prompt_count: 0
                  inference_config:
                    temperature: 0.0
                    top_p: 1.0
                    max_tokens: 512
                  judge:
                    model: claude-haiku-4-5
                    swap_runs: 2
                  notes: "Phase 3 pilot — Tamil vs Gemma-4, 200 translation prompts"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "403":
          description: Token lacks `registry:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /runs/{run_id}:
    parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
        description: Run ID in format `YYYY-MM-DD_HHMMSS_<5hex>`.
        example: 2026-06-18_072753_54b2bf

    get:
      summary: Get run
      description: Returns the full run manifest for a specific run ID.
      operationId: get_run
      tags:
        - Runs
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Run manifest found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "401":
          description: Missing or invalid JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Run not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
              example:
                detail: "Run '2026-06-18_072753_54b2bf' not found."